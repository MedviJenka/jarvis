name: jarvis

services:

  backend_service:
    container_name: backend_service
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./.claude:/app/.claude:ro
      - ./.env:/app/.env:ro
      - jarvis_db:/app/backend/data
    environment:
      - CLAUDE_DIR=/app/.claude
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app

  frontend_service:
    container_name: frontend_service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend_service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  nginx_service:
    container_name: nginx_service
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend_service
      - backend_service
    restart: unless-stopped
    networks:
      - app

networks:
  app:

volumes:
  jarvis_db: